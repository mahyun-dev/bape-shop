<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="데모용 전자담배 샵입니다. 다양한 전자담배 제품과 액세서리를 판매합니다. 안전한 구매와 빠른 배송을 약속드립니다.">
  <meta name="theme-color" content="#ff4081">
  
  <!-- Security Headers -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-XSS-Protection" content="1; mode=block">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  
  <title>데모용 전자담배 샵</title>
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/common.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/pages.css">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
</head>
<body>
  <!-- Age Verification (19+) - Will be shown on first visit -->
  <div id="ageVerification" class="age-verification-overlay" style="display: none;">
    <div class="age-verification-modal">
      <div class="age-icon">🔞</div>
      <h2 class="text-3xl font-bold mb-4">성인 인증</h2>
      <p class="text-secondary mb-6">
        본 사이트는 전자담배 제품을 판매하는 사이트입니다.<br>
        만 19세 이상만 이용 가능합니다.
      </p>
      <div class="flex gap-3 justify-center">
        <button id="ageYes" class="btn btn-primary btn-lg">만 19세 이상입니다</button>
        <button id="ageNo" class="btn btn-outline btn-lg">미성년자입니다</button>
      </div>
      <p class="text-xs text-tertiary mt-6">
        본인 확인을 위해 동의 여부가 저장됩니다.
      </p>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay" style="display: none;">
    <div class="loading-spinner"></div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Header -->
  <header id="header" class="header"></header>

  <!-- Main Navigation -->
  <nav id="navigation" class="nav"></nav>

  <!-- Main Content -->
  <main id="app" class="main-content"></main>

  <!-- Footer -->
  <footer id="footer" class="footer"></footer>

  <!-- Modal Container -->
  <div id="modalContainer"></div>

  <!-- Scripts -->
  <script type="module" src="./js/app.js"></script>
</body>
</html>
